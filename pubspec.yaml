name: nyzoride
description: "Nyzo Ride is a modern ride-hailing application that enables users to book rides, track drivers in real-time, make secure payments, and manage trips seamlessly."

publish_to: "none" 


version: 1.0.0+1

environment:
  sdk: ^3.7.2


dependencies:
  flutter:
    sdk: flutter

  
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.1
  pinput: ^5.0.1
  country_picker: ^2.0.27
  dotted_line: ^3.2.3
  provider: ^6.1.5+1
  firebase_auth:
  cloud_firestore:
  flutter_spinkit: ^5.2.2
  dotted_border: ^3.1.0
  image_picker: ^1.2.0
  carousel_slider: ^5.1.1
  flutter_localizations:
    sdk: flutter
  uuid: ^4.5.1
  bot_toast: ^4.1.3
  
  shared_preferences: ^2.5.3
  firebase_storage: ^13.0.0
  libphonenumber_plugin: ^0.3.3
  animated_text_kit: ^4.2.3
  geolocator: ^14.0.2
  google_maps_flutter: ^2.13.1
  url_launcher: ^6.3.2
  flutter_google_places_sdk: ^0.4.2+1
  geocoding: ^4.0.0
  firebase_database: ^12.0.3
  razorpay_flutter: ^1.4.0
  hexcolor: ^3.0.1
  dropdown_button2: ^2.3.9
  permission_handler: ^12.0.1
  googleapis_auth: ^2.0.0
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.5.0
  photo_view: ^0.15.0



flutter:
  
  generate: true
 
  uses-material-design: true

  
  assets:
    - images/
  

